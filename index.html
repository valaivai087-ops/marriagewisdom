<style>

a(18,27,26,.8),rgba(18,27,26,.22)),radial-gradient(circle at 30% 35%,rgba(255,244,225,.55),transparent 17%),radial-gradient(circle at 75% 30%,rgba(244,194,200,.45),transparent 16%),linear-gradient(135deg,#8a715e,#16745f 70%);border-radius:8px;box-shadow:var(--shadow)}.hero h2{max-width:900px;margin:0;font-size:clamp(30px,5.4vw,58px);line-height:1.1}.hero p{max-width:850px;margin:14px 0 0;font-size:clamp(16px,2.2vw,21px);line-height:1.6}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:22px 0}.primary,.ghost,.mini{min-height:40px;padding:9px 13px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{color:#fff;background:var(--green)}.ghost,.mini{color:var(--ink);background:#fff;border:1px solid var(--line)}.mini{width:36px;height:36px;min-height:36px;padding:0;flex:0 0 auto}.icon{width:18px;height:18px}.tiny{width:16px;height:16px}.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:18px;align-items:start}section,.panel{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.86);box-shadow:0 8px 24px rgba(31,35,40,.06)}section{padding:20px;margin-bottom:18px;scroll-margin-top:16px}.title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}h3{margin:0;font-size:22px}.tag{padding:5px 9px;border-radius:999px;color:var(--green);background:var(--green2);font-size:12px;font-weight:800;white-space:nowrap}.wisdom,.examples,.quotes,.steps{display:grid;gap:10px;margin:0;padding:0;list-style:none}.line,.examples li,.quotes li{display:grid;grid-template-columns:44px minmax(0,1fr) 40px;gap:10px;align-items:start;padding:12px;border:1px solid #eceff3;border-radius:8px;background:#fff}.line{grid-template-columns:minmax(0,1fr) 40px;border-left:4px solid var(--green);background:#fbfaf7}.steps li{display:grid;grid-template-columns:44px minmax(0,1fr);gap:10px;align-items:start;padding:12px;border:1px solid #eceff3;border-radius:8px;background:#fff}.num{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;color:#fff;background:var(--rose);font-size:13px;font-weight:900}.zh{margin:0 0 8px;font-size:18px;line-height:1.7;font-weight:900}.en,small{margin:0;color:#43515f;font-size:15px;line-height:1.6}.learn{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.learn-card{padding:14px;border:1px solid #eceff3;border-radius:8px;background:#fff}.learn-card b{color:var(--blue)}.learn-card p{margin:8px 0 0;color:var(--muted);line-height:1.6}.daily{position:sticky;top:24px;padding:18px}.task{padding:16px;border-radius:8px;background:var(--green2);color:#0a4e41;font-size:19px;font-weight:900;line-height:1.5}.check{display:flex;align-items:center;gap:10px;margin:14px 0}.check input{width:22px;height:22px;accent-color:var(--green)}label{line-height:1.4;font-weight:900}textarea{width:100%;min-height:110px;resize:vertical;padding:12px;border:1px solid var(--line);border-radius:8px;line-height:1.6;background:#fff}.formula{display:grid;gap:7px;text-align:center;color:var(--muted);font-weight:900}.formula b{color:var(--green);font-size:18px}.arrow{color:var(--gold)}.toast{position:fixed;right:18px;bottom:18px;max-width:320px;padding:12px 14px;border-radius:8px;color:#fff;background:#1f2a33;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:920px){.app{grid-template-columns:1fr}aside{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.nav{grid-template-columns:repeat(2,minmax(0,1fr))}.grid,.learn{grid-template-columns:1fr}.daily{position:static}}@media(max-width:560px){main{padding-inline:12px}.hero{min-height:360px;padding:20px}.nav{grid-template-columns:1fr}.toolbar button{width:100%}.line,.examples li,.quotes li{grid-template-columns:36px minmax(0,1fr)}.line .mini{grid-column:1/3;width:100%}.examples .mini,.quotes .mini{grid-column:2;width:100%}.num{width:30px;height:30px}}

<body>
<div class="app"><aside><div class="brand"><div class="mark">愛</div><div><h1>婚姻智慧 APP</h1><p>100 bilingual wisdoms into action</p></div></div><div class="picker"><label for="wisdomSelect">選擇 100 句婚姻智慧</label><select id="wisdomSelect"></select></div><nav class="nav"><button class="active" data-target="template">固定模板 <small>①-⑦</small></button><button data-target="examples">生活例子 <small>20</small></button><button data-target="quotes">延伸金句 <small>20</small></button><button data-target="method">行為公式 <small>不同答案</small></button><button data-target="practice">每日五件事 <small>打勾</small></button></nav><div class="streak"><strong id="streakCount">0</strong><span>已完成天數</span></div></aside><main><div class="hero"><h2 id="heroZh"></h2><p id="heroEn"></p></div><div class="toolbar"><button class="primary" id="speakToday">播放 這句英文</button><button class="ghost" id="speakAll">播放 模板朗讀</button><button class="ghost" id="stopSpeak">停止</button></div><div class="grid"><div><section id="template"><div class="title"><h3>固定智慧模板</h3><span class="tag">每句皆雙語 + 各別發音</span></div><div class="wisdom" id="wisdomList"></div></section><section id="examples"><div class="title"><h3>20 個生活例子</h3><span class="tag">每句英文可單獨播放</span></div><ul class="examples" id="exampleList"></ul></section><section id="quotes"><div class="title"><h3>延伸金句 20 個</h3><span class="tag">每句英文可單獨播放</span></div><ul class="quotes" id="quoteList"></ul></section><section id="method"><div class="title"><h3>AI 智慧轉行為公式</h3><span class="tag">依每句智慧生成不同答案</span></div><div class="learn" id="methodGrid"></div></section><section id="practice"><div class="title"><h3>每天只做五件事</h3><span class="tag">真正改變</span></div><ol class="steps" id="dailyFive"></ol></section></div><div class="panel daily"><h3>今天任務</h3><div class="task" id="todayTask"></div><div class="check"><input id="doneToday" type="checkbox"><label for="doneToday">晚上打勾：我今天完成了</label></div><label for="reflection">今天學到什麼？</label><textarea id="reflection" placeholder="寫一句就好，例如：我發現先稱讚，比先糾正更容易讓關係變柔軟。"></textarea><div class="toolbar"><button class="primary" id="saveReflection">儲存</button></div><div class="formula"><b>AI智慧</b><span class="arrow">↓</span><span>一句話</span><span class="arrow">↓</span><span>今日一個行動</span><span class="arrow">↓</span><span>每天打勾 + 回饋</span><span class="arrow">↓</span><b>人生改變</b></div></div></div></main></div><div class="toast" id="toast"></div>
<script>
const base=[
["婚姻不是找到對的人，而是一起成為更成熟的人。","Marriage is not about finding the right person. It is about becoming more mature together.","一起成長，比找到完美的人重要。","Growing together is more important than finding a perfect person.","成長","今天稱讚另一半一次。","Praise your spouse once today."],
["婚姻不是贏過對方，而是一起解決問題。","Marriage is not about winning against each other. It is about solving problems together.","一起解決，比爭輸贏重要。","Solving together matters more than winning.","合作","今天遇到一個問題時，用「我們一起想辦法」開頭。","When a problem appears today, begin with, Let us solve this together."],
["婚姻最大的敵人不是衝突，而是不願溝通。","The greatest enemy of marriage is not conflict, but the refusal to communicate.","願意溝通，衝突才有出口。","Communication gives conflict a way out.","溝通","今天主動問另一半：「你現在最需要我理解什麼？」","Ask your spouse today, What do you most need me to understand right now?"],
["愛是一個動詞，不只是感覺。","Love is a verb, not only a feeling.","愛要做出來，不只感覺到。","Love must be practiced, not only felt.","行動","今天做一件讓對方輕鬆一點的小事。","Do one small thing today that makes your spouse's day easier."],
["尊重比控制更能維持關係。","Respect sustains a relationship better than control.","少一點控制，多一點尊重。","Less control, more respect.","尊重","今天把一個決定交給對方選擇。","Let your spouse make one choice today."],
["信任需要長期累積，破壞卻可能只要一分鐘。","Trust takes a long time to build, but it can be damaged in one minute.","信任靠每天的小誠實累積。","Trust grows through small daily honesty.","信任","今天答應的事，只答應自己做得到的。","Today, promise only what you can truly do."],
["真誠比完美更重要。","Sincerity matters more than perfection.","不必完美，但要真誠。","You do not need to be perfect, but you need to be sincere.","真誠","今天用一句真心話取代一句敷衍話。","Replace one casual answer with one sincere sentence today."],
["願意道歉的人，比永遠想證明自己正確的人更幸福。","A person willing to apologize is happier than one who always tries to prove they are right.","先修復關係，比先證明自己重要。","Repairing the relationship comes before proving yourself.","道歉","今天若說話太重，三分鐘內補一句道歉。","If your words are too harsh today, add an apology within three minutes."],
["聆聽比急著回答更重要。","Listening matters more than rushing to answer.","先聽懂，再回應。","Understand first, then respond.","聆聽","今天對方說話時，先完整聽完再回答。","When your spouse speaks today, listen fully before answering."],
["理解比批評更有力量。","Understanding has more power than criticism.","先理解，批評才會變少。","Understanding first reduces criticism.","理解","今天把一句批評改成一句好奇提問。","Turn one criticism into one curious question today."],
["婚姻不是改變對方，而是先改變自己。","Marriage is not about changing the other person. It is about changing yourself first.","先調整自己，關係才會鬆動。","Change yourself first, and the relationship can move.","自省","今天先改一個自己的小習慣。","Change one small habit of your own today."]];
const themes=[["耐心","Patience"],["包容","Tolerance"],["界線","Boundaries"],["承諾","Commitment"],["欣賞","Appreciation"],["分擔","Sharing"],["誠實","Honesty"],["修復","Repair"],["幽默","Humor"],["節制","Restraint"],["體諒","Consideration"],["責任","Responsibility"],["親密","Intimacy"],["同理","Empathy"],["勇氣","Courage"],["謙卑","Humility"],["穩定","Stability"],["陪伴","Presence"],["選擇","Choice"],["盼望","Hope"]];
const zs=["婚姻的成熟","真正的愛","好的關係","幸福的家庭","長久的陪伴","溫柔的溝通","穩定的信任","每天的選擇"],zm=["不是靠一時感覺","不是靠誰比較厲害","不是靠完美表現","不是靠逃避問題","不是靠控制對方","不是靠沉默忍耐","不是靠猜測心意","不是靠偶爾浪漫"],ze=["而是願意每天練習一次。","而是願意先把心放柔軟。","而是願意把對方當成隊友。","而是願意在小事上守信用。","而是願意用行動修復關係。","而是願意把理解放在前面。","而是願意一起面對真實生活。","而是願意讓愛變成習慣。"];
const es=["Mature marriage","True love","A good relationship","A happy home","Long-lasting companionship","Gentle communication","Steady trust","A daily choice"],em=["is not built on temporary feelings","is not built on proving who is stronger","is not built on perfect performance","is not built on avoiding problems","is not built on controlling the other person","is not built on silent endurance","is not built on guessing each other's mind","is not built on occasional romance"],ee=["but on practicing once every day.","but on softening the heart first.","but on treating each other as teammates.","but on keeping promises in small things.","but on repairing the relationship through action.","but on putting understanding first.","but on facing real life together.","but on turning love into a habit."];
function makeWisdoms(){const out=base.map((x,i)=>({id:i+1,originalZh:x[0],originalEn:x[1],oneZh:x[2],oneEn:x[3],themeZh:x[4],themeEn:x[4],taskZh:x[5],taskEn:x[6]}));for(let i=out.length;i<100;i++){const t=themes[i%themes.length],a=i%8,b=Math.floor(i/2)%8,c=Math.floor(i/3)%8;out.push({id:i+1,originalZh:`${zs[a]}，${zm[b]}，${ze[c]}`,originalEn:`${es[a]} ${em[b]}, ${ee[c]}`,oneZh:`${t[0]}不是口號，是今天做得到的一個小行動。`,oneEn:`${t[1]} is not a slogan. It is one small action you can do today.`,themeZh:t[0],themeEn:t[1],taskZh:`今天用一個小行動練習「${t[0]}」。`,taskEn:`Practice ${t[1].toLowerCase()} through one small action today.`})}return out}
const wisdoms=makeWisdoms();
const exampleFrames=[["今天對方說話時，先看著對方聽完。","When your spouse speaks today, look at them and listen until they finish."],["今天把一句「你都」改成「我感覺」。","Change one You always sentence into an I feel sentence today."],["今天主動分擔一件家事。","Take the initiative to share one household task today."],["今天遇到不同意見時，先問原因。","When you disagree today, ask for the reason first."],["今天給對方一個不急著糾正的空間。","Give your spouse space today without rushing to correct them."],["今天晚餐時把手機放遠一點。","Put your phone farther away during dinner today."],["今天說一句具體的謝謝。","Say one specific thank-you today."],["今天稱讚對方一個努力，不只稱讚結果。","Praise one effort your spouse made today, not only the result."],["今天討論錢時先確認共同目標。","When discussing money today, confirm the shared goal first."],["今天孩子面前不貶低另一半。","Do not put down your spouse in front of the children today."],["今天累的時候，先說我需要休息，而不是發脾氣。","When tired today, say I need rest instead of losing your temper."],["今天一起整理一個小角落。","Tidy one small corner together today."],["今天走路或開車時，問對方今天最難的是什麼。","While walking or driving today, ask what was hardest for your spouse today."],["今天衝突後，主動說我們重新來一次。","After conflict today, say, Let us try again."],["今天把一件對方做好的事說出來。","Name one thing your spouse did well today."],["今天睡前握一下手或抱一下。","Before sleep today, hold hands or share a hug."],["今天為對方留一點安靜時間。","Leave your spouse a little quiet time today."],["今天一起回想一件以前一起走過的難關。","Recall one difficulty you overcame together before."],["今天用溫柔語氣說一件重要的事。","Say one important thing today with a gentle tone."],["今天睡前說一句：謝謝你還願意跟我一起學。","Before sleep, say: Thank you for still being willing to learn with me."]];
const quoteFrames=[["小事裡的選擇，會長成關係的方向。","Small choices become the direction of the relationship."],["真正的成熟，是先照顧關係，再照顧面子。","Real maturity protects the relationship before protecting pride."],["一個柔軟的回答，常常能救回一整天。","One gentle answer can often save an entire day."],["愛不是沒有情緒，而是不讓情緒掌權。","Love does not mean having no emotions. It means not letting emotions rule."],["每天一點點修復，勝過長久的冷戰。","A little repair each day is better than a long cold war."],["家不是講理贏的地方，是一起變好的地方。","Home is not a place to win arguments. It is a place to grow together."],["願意聽懂對方，是愛最實際的樣子。","The willingness to understand is one of love's most practical forms."],["好的婚姻，把問題放桌上，不把對方放對立面。","A good marriage puts the problem on the table, not the spouse on the opposite side."],["溫柔不是軟弱，是有力量地保護愛。","Gentleness is not weakness. It is strength used to protect love."],["信任不是一次宣告，是每天證明。","Trust is not a one-time statement. It is proven every day."],["愛會在被尊重的地方慢慢安定。","Love settles slowly where it is respected."],["懂得道歉的人，懂得把關係放在前面。","A person who apologizes knows how to put the relationship first."],["婚姻的智慧，是把今天過好。","The wisdom of marriage is to live today well."],["你怎麼說，比你說什麼更先被聽見。","How you speak is heard before what you say."],["把對方當隊友，很多話就不會那麼刺。","When you treat your spouse as a teammate, many words become less sharp."],["真正的親密，來自可以安全地說真話。","True intimacy comes from being safe enough to tell the truth."],["願意調整的人，讓愛有新的可能。","A person willing to adjust gives love new possibilities."],["每一次忍住責怪，都是一次關係投資。","Every time you hold back blame, you invest in the relationship."],["幸福不是突然來的，是每天被練出來的。","Happiness does not suddenly arrive. It is practiced every day."],["一起成長，是婚姻最長久的浪漫。","Growing together is marriage's longest-lasting romance."]];
const dailyFive=["今天一句 AI 智慧","今天一個生活例子","今天一個具體行動","晚上打勾完成","寫一句今天學到什麼"],keyStore="marriageWisdomAppStateV3",state=JSON.parse(localStorage.getItem(keyStore)||"{}"),$=s=>document.querySelector(s);let current=Number(state.current||0);const toast=$("#toast");
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}function pad(i){return String(i+1).padStart(2,"0")}function item(){return wisdoms[current]}function say(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1800)}function save(){state.current=current;localStorage.setItem(keyStore,JSON.stringify(state));streak()}function today(){return new Date().toISOString().slice(0,10)}function rkey(){return `${today()}-w${item().id}`}function streak(){const d=state.days||{};$("#streakCount").textContent=Object.values(d).filter(Boolean).length}
function speak(lines){if(!("speechSynthesis" in window)){say("這個瀏覽器不支援語音朗讀。");return}speechSynthesis.cancel();lines.forEach(text=>{const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.88;u.pitch=1;speechSynthesis.speak(u)})}function btn(en,label){return `<button class="mini" data-speak="${esc(en)}" title="${esc(label)}" aria-label="${esc(label)}">播放</button>`}
function template(w){return [["① 原始智慧",w.originalZh,w.originalEn],["② 一句話",w.oneZh,w.oneEn],["③ 國中白話",`這句話在說：婚姻裡遇到${w.themeZh}的功課時，不是先要求對方完美，而是兩個人一起學習、一起調整、一起把關係變成熟。`,`This means that when marriage gives you a lesson about ${w.themeEn.toLowerCase()}, you do not demand perfection first. You learn, adjust, and mature together.`],["④ 本質",`婚姻不是責怪題。婚姻是${w.themeZh}的練習題。`,`Marriage is not a blame problem. It is a practice of ${w.themeEn.toLowerCase()}.`],["⑤ 生活例子",`今天在一件小事裡，把${w.themeZh}做出來，而不是只放在心裡。`,`Today, practice ${w.themeEn.toLowerCase()} in one small real-life moment instead of only thinking about it.`],["⑥ 今天任務",w.taskZh,w.taskEn],["⑦ 延伸金句",`${w.themeZh}會讓愛從感覺變成習慣。`,`${w.themeEn} turns love from a feeling into a habit.`]]}
function examples(w){return exampleFrames.map(x=>[`${x[0]}（練習：${w.themeZh}）`,`${x[1]} Practice: ${w.themeEn}.`])}function quotes(w){return quoteFrames.map(x=>[`${x[0]} ${w.themeZh}就在這裡開始。`,`${x[1]} This is where ${w.themeEn.toLowerCase()} begins.`])}
function methods(w){return [["② 壓縮一句話",`${w.oneZh} 核心是把「${w.themeZh}」變成今天能做的一件事。`],["③ 白話理解",`用國中生聽得懂的話說：不要先怪對方，先問今天我可以怎麼練習${w.themeZh}。`],["④ 生活例子",`找三個場景：說話語氣、家事分擔、衝突後修復，都可以練習${w.themeZh}。`],["⑤ 一個行動",w.taskZh],["⑥ 環境設計",`把手機提醒設成「今天練習${w.themeZh}」，並把任務寫在看得見的地方。`],["⑦ 每日執行",`晚上只問一題：我今天有沒有把${w.themeZh}做出來一次？`],["⑧ 回饋修正",`若沒做到，寫下卡住點：太累、太急、太想贏，明天只修一個。`],["⑨ 每週整理",`週末留下最有效的一句話：哪一句最能幫我做到${w.themeZh}？`],["⑩ 教給別人",`把這句智慧講給一位朋友聽，直到自己能用生活例子說明。`],["⑪ 習慣形成",`連續七天都做一次，讓${w.themeZh}從提醒變成自然反應。`],["⑫ 身份改變",`我不是只懂婚姻道理的人，我是每天練習${w.themeZh}的人。`],["⑬ 人格形成",`重複練習後，我會變成更穩定、更願意修復關係的人。`],["⑭ 命運改變",`長期累積後，家庭氣氛、信任感、親密感都會被重新塑造。`]]}
function renderPicker(){wisdomSelect.innerHTML=wisdoms.map((w,i)=>`<option value="${i}">${String(w.id).padStart(3,"0")} ${esc(w.originalZh)}</option>`).join("");wisdomSelect.value=String(current)}
function render(){const w=item(),t=template(w),ex=examples(w),qu=quotes(w),me=methods(w);heroZh.textContent=w.originalZh;heroEn.textContent=w.originalEn;todayTask.textContent=w.taskZh;wisdomList.innerHTML=t.map(([a,z,e])=>`<article class="line"><div><p class="zh">${esc(a)}｜${esc(z)}</p><p class="en">${esc(e)}</p></div>${btn(e,a+" 英文發音")}</article>`).join("");exampleList.innerHTML=ex.map(([z,e],i)=>`<li><span class="num">${pad(i)}</span><span><strong>${esc(z)}</strong><small>${esc(e)}</small></span>${btn(e,"生活例子 "+pad(i)+" 英文發音")}</li>`).join("");quoteList.innerHTML=qu.map(([z,e],i)=>`<li><span class="num">${pad(i)}</span><span><strong>${esc(z)}</strong><small>${esc(e)}</small></span>${btn(e,"延伸金句 "+pad(i)+" 英文發音")}</li>`).join("");methodGrid.innerHTML=me.map(([a,b])=>`<div class="learn-card"><b>${esc(a)}</b><p>${esc(b)}</p></div>`).join("");const dailyFiveHtml=dailyFive.map((x,i)=>`<li><span class="num">${i+1}</span><span><strong>${esc(x)}</strong></span></li>`).join("");document.getElementById("dailyFive").innerHTML=dailyFiveHtml;loadDaily()}
function loadDaily(){const k=rkey();doneToday.checked=!!(state.days&&state.days[k]);reflection.value=state.reflections&&state.reflections[k]?state.reflections[k]:"";streak()}
renderPicker();render();wisdomSelect.addEventListener("change",e=>{current=Number(e.target.value);save();render();say(`已切換到第 ${item().id} 句智慧。`)});document.addEventListener("click",e=>{const b=e.target.closest("[data-speak]");if(b)speak([b.dataset.speak])});speakToday.addEventListener("click",()=>speak([item().originalEn]));speakAll.addEventListener("click",()=>speak(template(item()).map(x=>x[2])));stopSpeak.addEventListener("click",()=>{"speechSynthesis" in window&&speechSynthesis.cancel()});doneToday.addEventListener("change",e=>{state.days=state.days||{};state.days[rkey()]=e.target.checked;save();say(e.target.checked?"已完成今天任務。":"已取消今天完成紀錄。")});saveReflection.addEventListener("click",()=>{state.reflections=state.reflections||{};state.reflections[rkey()]=reflection.value.trim();save();say("今天的反思已儲存。")});document.querySelectorAll(".nav button").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));b.classList.add("active");document.getElementById(b.dataset.target).scrollIntoView({behavior:"smooth",block:"start"})}));
</script>
</body>
</html>
